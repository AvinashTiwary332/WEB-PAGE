<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text: #f7f9ff;
      --muted: #b8c0d9;
      --accent: #63e6be;
      --accent-2: #74c0fc;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(116, 192, 252, 0.24), transparent 30%),
        radial-gradient(circle at 82% 74%, rgba(99, 230, 190, 0.22), transparent 30%),
        linear-gradient(135deg, #090b10 0%, #121827 55%, #071416 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(92vw, 860px);
      padding: 56px;
      position: relative;
      isolation: isolate;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 90px var(--shadow);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(99, 230, 190, 0.42), transparent 35%, rgba(116, 192, 252, 0.35));
      opacity: 0.55;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      padding: 1px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.07);
      font-size: 0.92rem;
      letter-spacing: 0.02em;
    }

    .badge span {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.5rem, 11vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
      background: linear-gradient(90deg, #ffffff, #d6fff2 38%, #c7e7ff 72%, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 620px;
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.22rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 36px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 12px;
      color: #06110e;
      background: var(--accent);
      box-shadow: 0 10px 30px rgba(99, 230, 190, 0.22);
      font-weight: 750;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    a.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(99, 230, 190, 0.3);
      background: #7ff0cc;
    }

    a.secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      box-shadow: none;
    }

    .spark {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #ffffff;
      opacity: 0.7;
      animation: float 7s ease-in-out infinite;
    }

    .spark:nth-child(1) { top: 14%; left: 12%; animation-delay: 0s; }
    .spark:nth-child(2) { top: 22%; right: 16%; animation-delay: -1.5s; }
    .spark:nth-child(3) { bottom: 18%; left: 18%; animation-delay: -3s; }
    .spark:nth-child(4) { bottom: 24%; right: 12%; animation-delay: -4.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.45; }
      50% { transform: translateY(-18px) scale(1.4); opacity: 0.9; }
    }

    @media (max-width: 640px) {
      .page {
        padding: 38px 22px;
        border-radius: 18px;
      }

      .actions {
        flex-direction: column;
      }

      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Hello world welcome page">
    <i class="spark"></i>
    <i class="spark"></i>
    <i class="spark"></i>
    <i class="spark"></i>

    <div class="badge"><span></span> Fresh page ready</div>
    <h1>Hello World</h1>
    <p>
      A clean, fancy starter page with glassy depth, glowing accents, smooth motion,
      and a layout that looks sharp on phones and desktops.
    </p>
    <div class="actions">
      <a href="#">Get Started</a>
      <a class="secondary" href="#">Explore</a>
    </div>
  </main>
</body>
</html>
